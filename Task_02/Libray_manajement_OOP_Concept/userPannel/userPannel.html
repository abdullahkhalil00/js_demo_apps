<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 700px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .12);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: .3s;
        }

        input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 6px rgba(22, 163, 74, .25);
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        thead {
            background: #16a34a;
            color: #fff;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #ecfdf5;
        }

        @media (max-width:768px) {
            .container {
                width: 100%;
                padding: 20px;
            }

            th,
            td {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>User Panel</h1>

        <div class="form-group">
            <label for="findBooks">Find Book</label>
            <input type="text" id="findBooks" placeholder="Search a book">
        </div>

        <div class="form-group">
            <label for="isshuBook">Issue Book</label>
            <input type="text" id="isshuBook" placeholder="Enter book name">
        </div>

        <div class="form-group">
            <label for="returnBooks">Return Book</label>
            <input type="text" id="returnBooks" placeholder="Enter book name">
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Book Name</th>
                </tr>
            </thead>

            <tbody id="bookList"></tbody>
        </table>

    </div>

    <script src="../backend.js"></script>

</body>

</html>
