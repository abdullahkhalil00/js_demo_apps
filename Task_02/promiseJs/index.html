<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Order</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 380px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: .3s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 6px rgba(37, 99, 235, 0.25);
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            min-height: 60px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #dbe3ec;
            text-align: center;
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Coffee Order</h1>

        <label for="take_order">Give Order</label>

        <input
            type="text"
            id="take_order"
            placeholder="Enter your coffee order"
        >

        <button id="order_btn">Place Order</button>

        <p id="result"></p>
    </div>

    <script src="promise.js"></script>

</body>
</html>
