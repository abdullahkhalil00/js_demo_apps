<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User API</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:360px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        button{
            padding:12px 22px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        #detail{
            margin-top:25px;
        }

        #personImage{
            width:140px;
            height:140px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #2563eb;
            margin-bottom:20px;
            background:#e5e7eb;
        }

        #name{
            font-size:24px;
            color:#222;
            margin-bottom:10px;
        }

        #email,
        #country{
            color:#555;
            margin:8px 0;
            font-size:16px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Random User</h1>

        <div id="button">
            <button id="show">Show Random Person</button>
        </div>

        <div id="detail">
            <img src="" id="personImage" alt="Profile Image">

            <h4 id="name">Name</h4>

            <p id="email">Email</p>

            <p id="country">Country</p>
        </div>

    </div>

    <script src="apiRequest.js"></script>

</body>
</html>
