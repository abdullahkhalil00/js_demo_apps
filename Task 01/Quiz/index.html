<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Solve Quiz</h1>
    <p>Choose correct option from given options</p>

    <section id="attempt">
        <h3 id="question"></h3>

        <form>
            <p>
                <input type="radio" name="answer" id="opt_1" value="">
                <label for="opt_1" id="lbl_1"></label>

            </p>

            <p>

                <input type="radio" name="answer" id="opt_2" value="">
                <label for="opt_2" id="lbl_2"></label>
            </p>
            <p>
                <input type="radio" name="answer" id="opt_3" value="">
                <label for="opt_3" id="lbl_3"></label>

            </p>

            <p>

                <input type="radio" name="answer" id="opt_4" value="">
                <label for="opt_4" id="lbl_4"></label>
            </p>
        </form>
        <button type="button" id="next_question">Next</button>
    </section>
    <script src="script.js"></script>

</body>

</html>
