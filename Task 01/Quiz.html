<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 60px;
        background: #f5f7fb;
        color: #222;
    }

    h1 {
        font-size: 2.2rem;
        margin-bottom: 5px;
    }

    p {
        font-size: 1rem;
        color: #555;
        margin-bottom: 25px;
    }

    #attempt {
        width: 360px;
        margin: 0 auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        text-align: left;
    }

    #question {
        font-size: 1.3rem;
        margin-bottom: 20px;
    }

    form p {
        margin: 12px 0;
        padding: 10px;
        border: 1px solid #eee;
        border-radius: 8px;
        transition: 0.2s;
    }

    form p:hover {
        background: #f0f4ff;
        border-color: #cfd8ff;
    }

    input[type="radio"] {
        margin-right: 10px;
        transform: scale(1.1);
        cursor: pointer;
    }

    label {
        cursor: pointer;
    }

    #next_question {
        margin-top: 15px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4a6cf7;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
    }

    #next_question:hover {
        background: #3a57d6;
    }
</style>

<body>
    <h1>Solve Quiz</h1>
    <p>Choose correct option from given options</p>

    <section id="attempt">
        <h3 id="question"></h3>

        <form>
            <p>
                <input type="radio" name="answer" id="opt_1" value="">
                <label for="opt_1" id="lbl_1"></label>

            </p>

            <p>

                <input type="radio" name="answer" id="opt_2" value="">
                <label for="opt_2" id="lbl_2"></label>
            </p>
            <p>
                <input type="radio" name="answer" id="opt_3" value="">
                <label for="opt_3" id="lbl_3"></label>

            </p>

            <p>

                <input type="radio" name="answer" id="opt_4" value="">
                <label for="opt_4" id="lbl_4"></label>
            </p>
        </form>
        <button type="button" id="next_question">Next</button>
    </section>
    <script>
        let questions = ["What is 2 + 2", "What is 3 + 3", "what is 4 + 4", "What is 5 + 5 "];
        let answerers = [4, 6, 8, 10];
        let opttions = [[1, 2, 3, 4], [4, 5, 6, 7], [7, 8, 9, 10], [10, 12, 23, 23]];
        let next_question = document.getElementById('next_question');


        let put_question = document.getElementById('question');
        let count = 0;
        put_question.textContent = questions[count];
        let opt1 = document.getElementById('lbl_1');
        let opt2 = document.getElementById('lbl_2');
        let opt3 = document.getElementById('lbl_3');
        let opt4 = document.getElementById('lbl_4');

        let opt_1 = document.getElementById('opt_1');
        let opt_2 = document.getElementById('opt_2');
        let opt_3 = document.getElementById('opt_3');
        let opt_4 = document.getElementById('opt_4');
        opt1.textContent = opttions[count][0];
        opt2.textContent = opttions[count][1];
        opt3.textContent = opttions[count][2];
        opt4.textContent = opttions[count][3];

        opt_1.value = opttions[count][0];
        opt_2.value = opttions[count][1];
        opt_3.value = opttions[count][2];
        opt_4.value = opttions[count][3];
        let selected_options = []
        console.log(questions.length);
        next_question.addEventListener('click', () => {

            let selected = document.querySelector('input[name="answer"]:checked');

            if (!selected) {
                alert("Choose option");
                return;
            }

            selected_options[count] = selected.value;

            document.querySelectorAll('input[name="answer"]').forEach(r => r.checked = false);

            if (count < questions.length - 1) {

                count++;
                put_question.textContent = questions[count];

                opt1.textContent = opttions[count][0];
                opt2.textContent = opttions[count][1];
                opt3.textContent = opttions[count][2];
                opt4.textContent = opttions[count][3];

                opt_1.value = opttions[count][0];
                opt_2.value = opttions[count][1];
                opt_3.value = opttions[count][2];
                opt_4.value = opttions[count][3];

                if (count == questions.length - 1) {
                    next_question.textContent = 'Submit'
                }
                console.log(selected.value);
                console.log(selected_options);
            } else {
                selected_options[count] = selected.value;
                console.log(selected.value);
                console.log(selected_options);
                let body_text = document.querySelector('body');

                let isWrong = false;
                let wrong_index = []
                for (let i = 0; i < answerers.length; i++) {
                    if (answerers[i] != selected_options[i]) {
                        isWrong = true;
                        wrong_index.push(i);

                    }
                }

                body_text.innerHTML = isWrong
                    ? `<h1>Wrong Answer</h1> <p> ${wrong_index.map(i => questions[i]).join(", ")}</p>`
                    : '<h1>Correct Answer</h1>';
            }
        });
    </script>

</body>

</html>
